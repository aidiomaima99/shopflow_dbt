version: 2

models:

  - name: fct_orders
    description: "Table de faits principale"
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: order_amount
        data_tests:
          - not_null

  - name: dim_customers
    description: "Dimension clients"
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: email
        data_tests:
          - unique
          - not_null