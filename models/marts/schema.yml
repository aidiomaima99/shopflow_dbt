version: 2

models:

  - name: fct_orders
    description: "Table de faits principale — 1 ligne = 1 commande"
    columns:

      - name: order_id
        description: "Identifiant unique de la commande (PK)"
        data_tests:
          - unique
          - not_null

      - name: status
        description: "Statut de la commande"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'delivered', 'returned', 'cancelled']

      - name: customer_id
        description: "Clé étrangère vers dim_customers"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: order_amount
        description: "Montant HT en euros"
        data_tests:
          - not_null

  - name: dim_customers
    description: "Dimension clients enrichie"
    columns:

      - name: customer_id
        description: "Identifiant unique du client (PK)"
        data_tests:
          - unique
          - not_null

      - name: email
        description: "Email normalisé en minuscules"
        data_tests:
          - unique
          - not_null

      - name: total_orders
        description: "Nombre total de commandes"

      - name: total_spent_eur
        description: "Montant total dépensé en euros"